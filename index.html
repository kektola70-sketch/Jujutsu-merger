<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Merger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="main-menu">
        <h1 class="game-title">Jujutsu Merger</h1>
        <div class="button-container">
            <button id="btn-play" class="menu-btn">Play</button>
            <button id="btn-clans" class="menu-btn">Clans</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <div id="cutscene-ui"><h2 id="cutscene-text">Обучение: Сильнейший маг против Короля Проклятий</h2></div>
        
        <!-- UI для Территории (Domain) -->
        <div id="domain-text" style="display: none;">DOMAIN EXPANSION<br><span style="color:#a020f0">INFINITE VOID</span></div>

        <div id="battle-ui" style="display: none;">
            <div id="left-ui">
                <div class="player-hp-box">
                    <div class="name-tag">Satoru Gojo</div>
                    <div class="hp-bar-bg"><div id="gojo-hp-fill" class="hp-bar-fill gojo-color"></div></div>
                    <div id="gojo-hp-text" class="hp-text">5000 / 5000</div>
                </div>
                <button id="btn-lockon">🔒 Lock: OFF</button>
            </div>

            <div id="center-ui">
                <div class="player-hp-box right-side">
                    <div class="name-tag">Ryomen Sukuna</div>
                    <div class="hp-bar-bg"><div id="sukuna-hp-fill" class="hp-bar-fill sukuna-color"></div></div>
                    <div id="sukuna-hp-text" class="hp-text">25000 / 25000</div>
                </div>
            </div>

            <div id="skills-ui">
                <button class="skill-btn" onclick="useSkill(1)">1. Blue</button>
                <button class="skill-btn" onclick="useSkill(2)">2. Red</button>
                <button class="skill-btn" onclick="useSkill(3)">3. Blue MAX</button>
                <button class="skill-btn" onclick="useSkill(4)">4. Red MAX</button>
                <button class="skill-btn" onclick="useSkill(5)">5. Infinity</button>
                <button class="skill-btn" onclick="useSkill(6)">6. Purple</button>
                <button class="skill-btn" onclick="useSkill(7)">7. Awakening</button>
                <button class="skill-btn DE-btn" onclick="useSkill(8)">8. DOMAIN</button>
            </div>

            <div id="dpad">
                <button class="dpad-btn" id="dpad-up">▲</button><br>
                <button class="dpad-btn" id="dpad-left">◄</button>
                <button class="dpad-btn" id="dpad-down">▼</button>
                <button class="dpad-btn" id="dpad-right">►</button>
            </div>

            <div id="action-ui">
                <button class="action-btn hit-btn" id="btn-light">Attack</button>
            </div>
        </div>

        <div id="win-screen" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:red; font-size:60px; text-shadow:0 0 20px black; z-index:100;">
            SUKUNA DEFEATED!
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
