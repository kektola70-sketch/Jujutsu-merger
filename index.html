<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Merger</title>
    <link rel="stylesheet" href="style.css">
    <!-- Подключаем Three.js для 3D графики -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu">
        <h1 class="game-title">Jujutsu Merger</h1>
        <div class="button-container">
            <button id="btn-play" class="menu-btn">Play</button>
            <button id="btn-clans" class="menu-btn">Clans</button>
            <button id="btn-customize" class="menu-btn">Customize Skin</button>
            <button id="btn-afk" class="menu-btn">Afk mode</button>
            <button id="btn-settings" class="menu-btn">Settings</button>
        </div>
    </div>

    <!-- Контейнер для 3D игры -->
    <div id="game-container" style="display: none;">
        <!-- Интерфейс катсцены -->
        <div id="cutscene-ui">
            <h2 id="cutscene-text">Обучение: Сильнейший маг против Короля Проклятий</h2>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
