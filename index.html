<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Merger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Главное меню -->
    <div id="main-menu">
        <h1 class="game-title">Jujutsu Merger</h1>
        <div class="button-container">
            <button id="btn-play" class="menu-btn">Play</button>
            <button id="btn-clans" class="menu-btn">Clans</button>
            <button id="btn-customize" class="menu-btn">Customize Skin</button>
            <button id="btn-afk" class="menu-btn">Afk mode</button>
            <button id="btn-settings" class="menu-btn">Settings</button>
        </div>
    </div>

    <!-- Контейнер для 3D игры (пока скрыт) -->
    <div id="game-container" style="display: none;"></div>

    <script src="main.js"></script>
</body>
</html>
